<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chriz Anime Vault - A premium interactive website showcasing custom anime posters.">
    <title>Chriz Anime Vault</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader" class="loader">
        <div class="loader-content">
            <h1 class="logo-text">CHRIZ ANIME VAULT</h1>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="loading-percentage" class="loading-percentage">0%</div>
        </div>
    </div>

    <!-- WebGL Canvas for Three.js -->
    <canvas id="webgl-canvas"></canvas>

    <!-- Main Content wrapper for Lenis -->
    <div id="smooth-wrapper">
        <div id="smooth-content">

            <!-- Hero Section -->
            <section class="hero" id="hero">
                <div class="hero-content">
                    <h1 class="hero-title">ANIME POSTER COLLECTION</h1>
                    <p class="hero-subtitle">Original cinematic poster artworks.</p>
                </div>
                <div class="scroll-indicator">
                    <div class="mouse">
                        <div class="wheel"></div>
                    </div>
                </div>
            </section>

            <!-- 3D Cylinder Section (Empty height to trigger scroll) -->
            <section class="cylinder-section" id="gallery-trigger">
                <!-- Three.js renders behind this -->
            </section>

            <!-- Details Panel (Fixed position, activated via JS) -->
            <div id="detail-panel" class="detail-panel hidden">
                <h2 id="detail-title" class="detail-title">Title</h2>
                <h3 id="detail-anime" class="detail-anime">Anime</h3>
                <p id="detail-character" class="detail-character">Character</p>
                <div class="detail-meta">
                    <span id="detail-res">4K Resolution</span>
                    <span id="detail-year">2026</span>
                </div>
                <div class="detail-tags" id="detail-tags">
                </div>
            </div>

            <!-- Fullscreen Artwork Viewer -->
            <div id="fullscreen-viewer" class="fullscreen-viewer hidden">
                <button id="close-viewer" class="close-btn">&times;</button>
                <div class="viewer-ui">
                    <button class="action-btn download-btn">Download</button>
                    <button class="action-btn share-btn">Share</button>
                    <button class="action-btn fav-btn">Favorite</button>
                </div>
                <div class="resolutions">
                    <span>1080p</span>
                    <span>1440p</span>
                    <span>4K</span>
                </div>
            </div>

            <!-- Collection Section -->
            <section class="collection-section" id="collection">
                <h2 class="section-title">All Artworks</h2>
                <div class="masonry-grid" id="masonry-grid">
                    <!-- Images will be injected here -->
                </div>
            </section>

            <!-- About Section -->
            <section class="about-section" id="about">
                <div class="about-content">
                    <h2>Created by <span class="highlight">Chriz3656</span></h2>
                    <p>A premium digital anime art museum.</p>
                </div>
            </section>

            <!-- Footer -->
            <footer class="footer">
                <div class="glass-footer">
                    <div class="social-links">
                        <a href="#" class="magnetic-btn">GitHub</a>
                        <a href="#" class="magnetic-btn">Instagram</a>
                        <a href="#" class="magnetic-btn">Portfolio</a>
                        <a href="#" class="magnetic-btn">Email</a>
                    </div>
                    <p class="copyright">&copy; 2026 Chriz Anime Vault</p>
                </div>
            </footer>
            
        </div>
    </div>

    <!-- Background Effects Overlay -->
    <div class="noise-overlay"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    
    <!-- ES6 Modules for our app -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
